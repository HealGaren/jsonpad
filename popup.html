<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>jsonpad</title>
    <style>
      body {
        margin: 0;
        padding: 14px 16px;
        width: 260px;
        font: 13px/1.4 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        color: #0f172a;
      }
      h1 {
        font-size: 13px;
        font-weight: 700;
        margin: 0 0 10px;
        letter-spacing: 0.02em;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 8px 10px;
        border: 1px solid #e2e8f0;
        border-radius: 6px;
        background: #f8fafc;
        margin-bottom: 8px;
      }
      .row.toggle { cursor: pointer; }
      .row input[type="checkbox"] { transform: scale(1.2); }
      .section-label {
        display: block;
        font-size: 11px;
        color: #64748b;
        margin: 10px 0 4px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .radios {
        display: flex;
        gap: 6px;
      }
      .radios label {
        flex: 1;
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 6px 8px;
        border: 1px solid #e2e8f0;
        border-radius: 6px;
        background: #f8fafc;
        cursor: pointer;
        font-size: 12px;
      }
      .radios input { margin: 0; }
      .hint {
        margin-top: 10px;
        font-size: 11px;
        color: #64748b;
        line-height: 1.5;
      }
      kbd {
        font: inherit;
        padding: 1px 5px;
        border: 1px solid #cbd5e1;
        border-bottom-width: 2px;
        border-radius: 3px;
        background: #fff;
        font-size: 10px;
      }
    </style>
  </head>
  <body>
    <h1>jsonpad</h1>
    <label class="row toggle">
      <span>Enabled</span>
      <input type="checkbox" id="enabled" />
    </label>

    <span class="section-label">Default view</span>
    <div class="radios">
      <label><input type="radio" name="view" value="split" />split</label>
      <label><input type="radio" name="view" value="raw" />raw</label>
      <label><input type="radio" name="view" value="jsoncrack" />jsoncrack</label>
    </div>

    <div class="hint">
      Focus an <code>input</code> / <code>textarea</code> with JSON to see the
      <code>{}</code> trigger. Force open on any field with
      <kbd>Alt</kbd> + <kbd>Shift</kbd> + <kbd>J</kbd>.
    </div>
    <script src="popup.js"></script>
  </body>
</html>
